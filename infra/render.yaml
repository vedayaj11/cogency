services:
  - type: web
    name: cogency-api
    runtime: docker
    dockerfilePath: ./infra/docker/Dockerfile.api
    plan: standard
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: cogency-postgres
          property: connectionString
      - key: TEMPORAL_HOST
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: WORKOS_API_KEY
        sync: false

  - type: worker
    name: cogency-worker
    runtime: docker
    dockerfilePath: ./infra/docker/Dockerfile.worker
    plan: standard
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: cogency-postgres
          property: connectionString
      - key: TEMPORAL_HOST
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false

databases:
  - name: cogency-postgres
    plan: basic-256mb
    postgresMajorVersion: "16"
