[project]
name = "cogency-prompts"
version = "0.0.1"
description = "Versioned prompts (synced to Langfuse)"
requires-python = ">=3.12"
dependencies = ["pydantic>=2.9"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["prompts"]
