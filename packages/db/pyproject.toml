[project]
name = "cogency-db"
version = "0.0.1"
description = "SQLAlchemy async session + ORM models for sf.* and cogency.* schemas"
requires-python = ">=3.12"
dependencies = [
    "sqlalchemy>=2.0.35",
    "asyncpg>=0.29",
    "pydantic>=2.9",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["db"]
