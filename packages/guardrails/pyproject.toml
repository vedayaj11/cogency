[project]
name = "cogency-guardrails"
version = "0.0.1"
description = "PII redaction, prompt injection defense, citation enforcement"
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2.9",
    "presidio-analyzer>=2.2",
    "presidio-anonymizer>=2.2",
    "llm-guard>=0.3",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["guardrails"]
