[project]
name = "cogency-evals"
version = "0.0.1"
description = "Golden datasets + LLM-judge rubrics"
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2.9",
    "openai>=1.50",
    "anthropic>=0.40",
    "cogency-schemas",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["evals"]
