[project]
name = "cogency-rag"
version = "0.0.1"
description = "Citation-grounded RAG: chunking, embeddings, pgvector store, ingest pipeline"
requires-python = ">=3.12"
dependencies = [
    "openai>=1.50",
    "tiktoken>=0.7",
    "pdfplumber>=0.11",
    "PyPDF2>=3.0",
    "numpy>=2.0",
    "sqlalchemy>=2.0.35",
    "pydantic>=2.9",
    "cogency-db",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["rag"]
