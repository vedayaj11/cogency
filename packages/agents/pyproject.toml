[project]
name = "cogency-agents"
version = "0.0.1"
description = "LangGraph graphs: meta_agent, skills, copilot"
requires-python = ">=3.12"
dependencies = [
    "langgraph>=0.2",
    "langchain-openai>=0.2",
    "openai>=1.50",
    "pydantic>=2.9",
    "cogency-schemas",
    "cogency-aop",
    "cogency-prompts",
    "cogency-guardrails",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["agents"]
