[project]
name = "cogency-agents"
version = "0.0.1"
description = "LangGraph graphs: meta_agent, skills, copilot"
requires-python = ">=3.12"
dependencies = [
    "langgraph>=0.2",
    "langchain-anthropic>=0.2",
    "anthropic>=0.40",
    "pydantic>=2.9",
    "cogency-schemas",
    "cogency-aop",
    "cogency-prompts",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["agents"]
