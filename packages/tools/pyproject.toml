[project]
name = "cogency-tools"
version = "0.0.1"
description = "Tool registry: Salesforce mirror queries, RAG, email, refund APIs"
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2.9",
    "sqlalchemy>=2.0.35",
    "cogency-db",
    "cogency-schemas",
    "cogency-salesforce",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["tools"]
