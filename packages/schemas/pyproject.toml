[project]
name = "cogency-schemas"
version = "0.0.1"
description = "Pydantic models shared across api/worker/agents"
requires-python = ">=3.12"
dependencies = ["pydantic>=2.9"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["schemas"]
